name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: gofmt
        run: |
          diff="$(gofmt -l .)"
          if [ -n "$diff" ]; then
            echo "gofmt needs to be run on the following files:"
            echo "$diff"
            exit 1
          fi

  web:
    name: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24.13.0"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        working-directory: web
        run: npm ci

      - name: tsc --noEmit
        working-directory: web
        run: npx tsc --noEmit

      - name: build
        working-directory: web
        run: npm run build

      # committed web/dist is the canonical embed source (go:embed). This build is
      # normalized by hand at merge time, so a fresh build must reproduce it exactly.
      # Determinism depends on the node/npm toolchain (rolldown/mermaid chunk hashes);
      # if this starts flaking across runners, relax to continue-on-error rather than
      # dropping the check outright.
      - name: verify web/dist matches committed build
        run: git diff --exit-code -- web/dist

  lint:
    name: pmem lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: build pmem
        run: go build -o /tmp/pmem ./cmd/pmem

      - name: pmem lint
        run: /tmp/pmem lint
